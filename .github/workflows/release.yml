name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or tag to build (defaults to current ref).
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  GO_VERSION: '1.26.3'

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Re-run every gate Conformance/Unit runs on PRs. A broken build must NOT
  # publish.
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: go test (race) — everything except the driver matrix
        run: |
          set -euo pipefail
          go test \
            -race -count=1 -timeout=600s \
            $(go list ./... \
              | grep -vE '/(store/(postgres|entdb))(/|$)')

  docker-smoke:
    name: Container build smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: docker build --target server
        uses: docker/build-push-action@v7
        with:
          context: .
          target: server
          push: false
          load: true
          tags: notify:release-smoke
          cache-from: type=gha,scope=release-docker
          cache-to: type=gha,mode=max,scope=release-docker

      - name: docker run smoke
        shell: bash
        run: |
          set -euo pipefail
          cid="$(
            docker run -d \
              -e NOTIFY_AUTH_DEV_MODE=true \
              -e NOTIFY_STORE_DRIVER=memory \
              -p 127.0.0.1:18080:8080 \
              -p 127.0.0.1:18081:8081 \
              -p 127.0.0.1:19090:9090 \
              notify:release-smoke
          )"
          trap 'docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:19090/healthz > /tmp/notify-health.json; then
              grep -q '"status":"ok"' /tmp/notify-health.json
              exit 0
            fi
            if [[ "$(docker inspect -f '{{.State.Running}}' "$cid")" != "true" ]]; then
              docker logs "$cid"
              exit 1
            fi
            sleep 1
          done
          docker logs "$cid"
          exit 1

  # ---------------------------------------------------------------------------
  # Build, push, sign, and scan the published image.
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: [test, docker-smoke]
    permissions:
      contents: read
      packages: write
      id-token: write   # cosign keyless OIDC
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Inject version from git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VER="${GITHUB_REF_NAME#v}"
          echo "$VER" > VERSION

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}
            type=sha,prefix=sha-

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          target: server
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Sign published image (keyless OIDC)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          # Sign each tag's specific digest. cosign records the signature in the same registry.
          for tag in $TAGS; do
            cosign sign --yes "${tag}@${DIGEST}"
          done

  # ---------------------------------------------------------------------------
  # Post-publish vulnerability scan. Tag is already published; this fails the
  # release run if HIGH/CRITICAL CVEs are found in the image, so the operator
  # is alerted before users pull it.
  # ---------------------------------------------------------------------------
  scan-image:
    name: Scan published image (Trivy)
    runs-on: ubuntu-latest
    needs: [build-and-push]
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Pick first tag for scanning
        id: tag
        env:
          TAGS: ${{ needs.build-and-push.outputs.tags }}
        run: |
          first_tag="$(echo "$TAGS" | head -n1)"
          echo "image=${first_tag}" >> "$GITHUB_OUTPUT"

      - name: Run Trivy vulnerability scanner
        # v0.36.0 (2026-04-22), pinned by commit SHA. Tags 0.0.1–0.34.2
        # are flagged as compromised by the Trivy March 2026 advisory.
        # SHA pin defends against future tag retargeting.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.tag.outputs.image }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image

  # ---------------------------------------------------------------------------
  # Publish the proto sources as versioned archives on the GitHub Release,
  # alongside a reference to the just-published container image. Consumers who
  # want to codegen against a specific notify version can download
  # `notify-protos-<version>.tar.gz` instead of vendoring a git ref.
  # ---------------------------------------------------------------------------
  release-protos:
    name: Publish proto bundle to GitHub Release
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Build proto archives
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VER="${VERSION#v}"
          mkdir -p dist
          tar -czf "dist/notify-protos-${VER}.tar.gz" proto buf.yaml buf.gen.yaml
          (cd "$GITHUB_WORKSPACE" && zip -r "dist/notify-protos-${VER}.zip" proto buf.yaml buf.gen.yaml)
          (cd dist && sha256sum \
            "notify-protos-${VER}.tar.gz" \
            "notify-protos-${VER}.zip" \
            > "notify-protos-${VER}.sha256")
          ls -la dist/

      - name: Create GitHub Release with proto bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DIGEST: ${{ needs.build-and-push.outputs.digest }}
        run: |
          set -euo pipefail
          VER="${VERSION#v}"
          notes_file="$(mktemp)"
          {
            echo "## Container image"
            echo
            echo "\`${IMAGE}:${VER}\`"
            echo
            echo "Digest: \`${DIGEST}\`"
            echo
            echo "Signed via cosign keyless OIDC and scanned with Trivy (HIGH/CRITICAL gate)."
            echo
            echo "## Proto bundle"
            echo
            echo "The \`notify-protos-${VER}.{tar.gz,zip}\` archives contain the \`proto/\` tree, \`buf.yaml\`, and \`buf.gen.yaml\` from this tag. Consumers can vendor or codegen against this exact version without depending on a git ref."
            echo
            echo "Verify integrity using the accompanying \`notify-protos-${VER}.sha256\` file."
          } > "$notes_file"

          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file "$notes_file" \
            "dist/notify-protos-${VER}.tar.gz" \
            "dist/notify-protos-${VER}.zip" \
            "dist/notify-protos-${VER}.sha256"
